services:
  prometheus:
    image: ${PROMETHEUS_IMAGE}
    container_name: prometheus
    networks:
      - monitoring
    volumes:
      - prometheus_volume:/etc/prometheus
    ports:
      - "${PROMETHEUS_PORT}:9090"
    command: 
      - "--web.enable-remote-write-receiver" 
      - "--config.file=/etc/prometheus/prometheus.yml"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/-/ready"]
      interval: 10s
      timeout: 5s
      retries: 3

  order-service:
    build:
      context: ./OrderService
      dockerfile: Dockerfile
    image: ${ORDER_SERVICE_IMAGE}
    container_name: order-service
    networks:
      - monitoring
    ports:
      - "${ORDER_SERVICE_PORT}:8080"
    depends_on:
      - alloy

  loki:
    image: ${LOKI_IMAGE}
    container_name: loki
    networks:
      - monitoring
    ports:
      - "${LOKI_PORT}:3100"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 3

  alloy:
    image: ${ALLOY_IMAGE}
    container_name: alloy
    networks:
      - monitoring
    ports:
      - "${ALLOY_HTTP_PORT}:8081"
      - "${ALLOY_OTLP_GRPC_PORT}:4317"
      - "${ALLOY_OTLP_HTTP_PORT}:4318"
    volumes:
      - alloy_etc:/etc/alloy
      - alloy_log:/var/log
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:8081
      - /etc/alloy/config.alloy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/ready"]
      interval: 10s
      timeout: 5s
      retries: 3

  minio:
    image: ${MINIO_IMAGE}
    container_name: minio
    command: server /data --console-address ":${MINIO_CONSOLE_PORT}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    networks:
      - monitoring
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: ${MINIO_MC_IMAGE}
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME}
    volumes:
      - ./init-minio.sh:/init-minio.sh
    entrypoint: sh /init-minio.sh
    networks:
      - monitoring

  tempo:
    image: ${TEMPO_IMAGE}
    container_name: tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml
    ports:
      - "${TEMPO_HTTP_PORT}:3200"
    depends_on:
      minio-init:
        condition: service_completed_successfully
    networks:
      - monitoring
    
  grafana:
    image: ${GRAFANA_IMAGE}
    container_name: grafana
    networks:
      - monitoring
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_USERS_ALLOW_SIGN_UP: ${GF_USERS_ALLOW_SIGN_UP}
    volumes:
      - grafana_volume:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus
      - tempo
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  monitoring:
    name: monitoring
    external: false

volumes:
  prometheus_volume:
    driver: local
    name: prometheus_volume_alloy_02
    driver_opts:
      type: none
      o: bind
      device: ./prometheus_volume

  alloy_etc:
    driver: local
    name: alloy_etc_02
    driver_opts:
      type: none
      o: bind
      device: ./alloy_etc

  alloy_log:
    driver: local
    name: alloy_log_02
    driver_opts:
      type: none
      o: bind
      device: ./alloy_log

  grafana_volume:
    driver: local
    name: grafana_volume_alloy_02